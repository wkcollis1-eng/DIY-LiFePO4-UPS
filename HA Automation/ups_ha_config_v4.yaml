#
#   # --- Threshold Reference Card ---
#   - type: markdown
#     title: UPS Thresholds
#     content: |
#       | Threshold | Voltage | Action |
#       |---|---|---|
#       | PSU Float | 13.3V | Normal operation |
#       | Stage 1 LVD | 12.2V | HA graceful shutdown |
#       | PSU Failure | 12.0V | Emergency shutdown |
#       | BP-65 Reconnect | 12.8V | Loads restored |
#       | Stage 2 LVD | 11.8V | BP-65 hard cutoff |
#       | Temp Inhibit | <0°C | PSU disabled |
#       | Temp Alert | >40°C | Check ventilation |
#
#
# =============================================================================
# Required Helpers (Settings → Devices & Services → Helpers)
# =============================================================================
#
#   input_boolean.ups_outage_active
#     Type: Toggle
#     Purpose: Tracks active outage; guards Phase 1 against timer resets
#
#   input_datetime.ups_outage_start
#     Type: Date and Time
#     Purpose: Outage timestamp; persists through hardware shutdown
#
#   input_boolean.ups_test_mode
#     Type: Toggle
#     Purpose: Dry-run gate — blocks hassio.host_shutdown and Kasa on/off
#              while allowing all notifications and logic to run normally.
#              Turn ON before simulation testing; turn OFF before live deployment.
#              Default: OFF
#
# =============================================================================
# Entity IDs to Confirm Before Deployment
# =============================================================================
#
#   switch.kasa_smart_plug_energy_monitoring     → your Kasa entity ID
#   notify.mobile_app_your_phone                 → your notify target
#   sensor.ups_battery_voltge_ups_battery_voltage_voltmeter  → confirm in HA developer tools
#   sensor.ups_battery_voltge_ups_temperature_temperature → confirm in HA developer tools
#
# =============================================================================
# Kasa Reliability Notes
# =============================================================================
#
# Kasa plugs frequently show "unavailable" in HA during:
#   - HA restarts (Kasa integration re-polls on startup, may take 30–90s)
#   - Kasa cloud service hiccups (independent of local power state)
#   - Router DHCP lease renewals
#
# Mitigations in this config:
#   1. for: 60s on grid_down trigger (most flaps resolve within 45s)
#   2. Phase 1b monitoring alert — notifies without setting outage flag
#      when Kasa goes offline but voltage stays >13.0V (PSU still running)
#   3. PSU failure fallback trigger — catches real problems when Kasa is
#      incorrectly showing online during an actual outage
#
# Optional additional hardening (not implemented here):
#   - Enable local Kasa control via python-kasa to reduce cloud dependency
#   - Add a ping binary_sensor to router as secondary grid indicator
#
# =============================================================================
# Shelly Unavailability Notes
# =============================================================================
#
# Shelly Plus Uni may show "unavailable" during:
#   - HA restarts (integration re-poll delay)
#   - Shelly firmware updates
#   - 2.4GHz WiFi interference
#
# Risk: sensor.ups_battery_voltage_filtered defaults to float(0) = 0.0V
# when Shelly is unavailable. Without guards, this fires low_battery
# immediately on Shelly reconnect during normal AC-on operation.
#
# Mitigation in this config:
#   Phase 2 and Phase 3 both include explicit availability conditions blocking
#   execution when the filtered sensor is unavailable or unknown.
#
# =============================================================================
# Known Edge Case: The Deadlock State
# =============================================================================
#
# Trigger: Outage drops voltage below 12.2V → HA shuts down, but AC
#          restores before battery hits 11.8V BP-65 cutoff.
#
# State: HA Green hardware powered but OS halted. PSU resumes charging.
#        HA never boots. No automation runs. "Zombie" state.
#
# Manual Recovery via Kasa app (cellular, not WiFi):
#   1. Turn Kasa plug OFF
#   2. Wait 10–20 min for battery to drain to 11.8V (BP-65 cuts loads)
#   3. Turn Kasa plug ON
#   4. BP-65 reconnects at 12.8V → HA Green cold boots cleanly
#
# =============================================================================
